<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center antialiased">

    <div class="w-full max-w-md bg-gray-50 min-h-screen relative shadow-2xl sm:my-8 sm:rounded-[2rem] sm:min-h-0 sm:h-[850px] flex flex-col overflow-hidden border-gray-200 sm:border-8">
        
        <div class="bg-gradient-to-r from-blue-900 to-blue-800 text-white px-6 py-8 rounded-b-3xl shadow-lg relative z-10 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Orders</h1>
                <p class="text-blue-200 text-sm mt-1">Live Delivery Dashboard</p>
            </div>
            <button onclick="fetchOrders()" class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center backdrop-blur-sm transition active:scale-95 shadow-md">
                <i class="fas fa-sync-alt" id="refreshIcon"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar px-5 py-6 space-y-4" id="orderContainer">
            
            <div id="loader" class="flex flex-col items-center justify-center py-20 text-gray-400">
                <i class="fas fa-spinner fa-spin text-4xl text-blue-500 mb-4"></i>
                <p class="text-sm font-medium">Loading orders...</p>
            </div>

        </div>

    </div>

<script>
    // DHYAN DEIN: Yahan apna NAYA Google Apps Script URL paste karein
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwrlLjjecGsu6Mh3QYlk_gDj8I2XJtOmgJUG5frgMXGFF7S24X9wkzk2ZFHx6d-suW5fw/exec';
    
    const orderContainer = document.getElementById('orderContainer');
    const refreshIcon = document.getElementById('refreshIcon');

    // Rang decide karne wala function (Item ke hisaab se badge color)
    function getBadgeColor(itemType) {
        if(itemType === 'Food') return 'bg-orange-100 text-orange-700 border-orange-200';
        if(itemType === 'Electronics') return 'bg-blue-100 text-blue-700 border-blue-200';
        if(itemType === 'Fragile') return 'bg-red-100 text-red-700 border-red-200';
        return 'bg-gray-100 text-gray-700 border-gray-200'; // Standard
    }

    // Data fetch karne ka function
    function fetchOrders() {
        // Loading animation shuru
        refreshIcon.classList.add('fa-spin');
        orderContainer.innerHTML = `
            <div class="flex flex-col items-center justify-center py-20 text-gray-400">
                <i class="fas fa-spinner fa-spin text-4xl text-blue-500 mb-4"></i>
                <p class="text-sm font-medium">Loading live orders...</p>
            </div>`;

        fetch(scriptURL)
            .then(response => response.json())
            .then(data => {
                orderContainer.innerHTML = ''; // Loader hata do
                refreshIcon.classList.remove('fa-spin'); // Sync icon roko
                
                if(data.length === 0) {
                    orderContainer.innerHTML = `
                        <div class="text-center py-20 text-gray-400">
                            <i class="fas fa-box-open text-5xl mb-4 opacity-50"></i>
                            <p>Abhi tak koi order nahi aaya hai.</p>
                        </div>`;
                    return;
                }

                // Har order ke liye ek Card banana
                data.forEach(order => {
                    // Date format theek karna
                    let orderDate = new Date(order.Date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit' });

                    const badgeClass = getBadgeColor(order.ItemType);

                    const cardHTML = `
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow relative">
                            
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <h3 class="font-bold text-gray-900 text-lg">${order.Naam}</h3>
                                    <p class="text-xs text-gray-400"><i class="far fa-clock mr-1"></i>${orderDate}</p>
                                </div>
                                <span class="px-3 py-1 rounded-full text-xs font-semibold border ${badgeClass}">
                                    ${order.ItemType}
                                </span>
                            </div>

                            <hr class="border-gray-50 my-3">

                            <div class="space-y-2 text-sm">
                                <div class="flex items-start text-gray-600">
                                    <i class="fas fa-phone-alt mt-1 mr-3 text-gray-400 w-4"></i>
                                    <a href="tel:${order.Phone}" class="font-medium text-blue-600">${order.Phone}</a>
                                </div>
                                <div class="flex items-start text-gray-600">
                                    <i class="fas fa-map-marker-alt mt-1 mr-3 text-gray-400 w-4"></i>
                                    <div>
                                        <p>${order.Address}</p>
                                        <p class="text-xs text-gray-400 mt-0.5">Near: ${order.Landmark}</p>
                                    </div>
                                </div>
                                <div class="flex items-start text-gray-600">
                                    <i class="fas fa-city mt-1 mr-3 text-gray-400 w-4"></i>
                                    <p>${order.City}, ${order.State} - <span class="font-medium">${order.Pincode}</span></p>
                                </div>
                            </div>

                        </div>
                    `;
                    orderContainer.innerHTML += cardHTML;
                });
            })
            .catch(error => {
                refreshIcon.classList.remove('fa-spin');
                orderContainer.innerHTML = `
                    <div class="text-center py-20 text-red-500">
                        <i class="fas fa-exclamation-triangle text-4xl mb-4"></i>
                        <p>Data load karne mein error aayi.</p>
                        <p class="text-xs mt-2 text-gray-400">${error.message}</p>
                    </div>`;
            });
    }

    // Page load hote hi data fetch karna
    window.onload = fetchOrders;

</script>

</body>
</html>
